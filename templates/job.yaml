{{- $root := . -}}
{{- range $idx, $job := .Values.jobs }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bss.fullname" $root }}-{{ $job.name | default (printf "job-%d" $idx) }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "bss.labels" $root | nindent 4 }}
    {{- with $job.labels }}
    {{ toYaml . | nindent 4 }}
    {{- end }}
  {{- with $job.annotations }}
  annotations:
    {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ default 6 $job.backoffLimit }}
  {{- if $job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ $job.activeDeadlineSeconds }}
  {{- end }}
  {{- if $job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ $job.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "bss.labels" $root | nindent 8 }}
        job-name: {{ $job.name | default (printf "job-%d" $idx) }}
    spec:
      restartPolicy: {{ default "OnFailure" $job.restartPolicy }}
      {{- if $job.serviceAccountName }}
      serviceAccountName: {{ $job.serviceAccountName }}
      {{- end }}
      containers:
        - name: {{ $job.name | default (printf "job-%d" $idx) }}
          image: {{ $job.image }}
          {{- if $job.imagePullPolicy }}
          imagePullPolicy: {{ $job.imagePullPolicy }}
          {{- end }}
          {{- if $job.command }}
          command:
            {{ toYaml $job.command | nindent 12 }}
          {{- end }}
          {{- if $job.args }}
          args:
            {{ toYaml $job.args | nindent 12 }}
          {{- end }}
          {{- if $job.env }}
          env:
            {{- if kindIs "map" $job.env }}
            {{- range $name, $val := $job.env }}
            - name: {{ $name }}
              value: {{ $val | quote }}
            {{- end }}
            {{- else }}
            {{ toYaml $job.env | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if $job.resources }}
          resources:
            {{ toYaml $job.resources | nindent 12 }}
          {{- end }}
          {{- if $job.volumeMounts }}
          volumeMounts:
            {{ toYaml $job.volumeMounts | nindent 12 }}
          {{- end }}
      {{- if $job.volumes }}
      volumes:
        {{ toYaml $job.volumes | nindent 8 }}
      {{- end }}
      {{- if $job.nodeSelector }}
      nodeSelector:
        {{ toYaml $job.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $job.tolerations }}
      tolerations:
        {{ toYaml $job.tolerations | nindent 8 }}
      {{- end }}
      {{- if $job.affinity }}
      affinity:
        {{ toYaml $job.affinity | nindent 8 }}
      {{- end }}
---
{{- end }}
