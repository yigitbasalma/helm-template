# Dev ortamı — sadece farklı olan key'ler
# Kullanım: helm install myapp . -f values.yaml -f values-dev.yaml

replicaCount: 1

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

environmentsMap:
  DATABASE_HOST: "db-dev.internal"
  LOG_LEVEL: "debug"
  APP_ENV: "development"
  FEATURE_FLAG_NEW_UI: "true"