# Base values — tüm ortamlarda ortak olan değerler
# Bu dosya her deploy'da kullanılır

replicaCount: 2

image:
  repository: mycompany/backend-api
  pullPolicy: IfNotPresent
  tag: "1.5.0"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Map-based env vars — ortam dosyalarıyla merge olur
# Sadece farklı olan key'leri ortam dosyasında override et
environmentsMap:
  DATABASE_HOST: "db.default.svc"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "appdb"
  DATABASE_POOL_SIZE: "10"
  REDIS_HOST: "redis.default.svc"
  REDIS_PORT: "6379"
  CACHE_TTL: "300"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  APP_ENV: "default"
  APP_PORT: "8080"
  CORS_ORIGINS: "*"
  RATE_LIMIT: "100"
  SESSION_TIMEOUT: "3600"
  FEATURE_FLAG_NEW_UI: "false"

# List-based env vars — secret ref gibi karmaşık değerler için
environments:
  - name: DATABASE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: password
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: redis-credentials
        key: password